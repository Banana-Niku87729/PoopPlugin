#  Ko-Fi ランク購入システム設定
# ─────────────────────────────────────────────────────────

# Ko-Fi の Webhook 検証トークン（Ko-Fi管理画面 > Webhooks で確認）
# 空白の場合はトークン検証をスキップします（非推奨）
kofi-webhook-secret: "d73396c2-8dd9-4908-9bdf-c392c06ec425"

# Ko-Fi Webhook を受信する HTTP サーバーのポート番号
# サーバーのファイアウォールでこのポートを開放してください
kofi-webhook-port: 3377

# Ko-Fi API トークン（将来の拡張用。現在は Webhook のみ使用）
kofi-token: ""

